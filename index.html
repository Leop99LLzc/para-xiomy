<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🌹 Feliz Cumpleaños Xiomy</title>

  <!--
    ESTRATEGIA RESPONSIVE MOBILE-FIRST
    ───────────────────────────────────
    • #app  → wrapper relativo, altura fijada por JS a window.innerHeight
              (evita el bug de iOS Safari con 100vh y la barra de navegación)
    • canvas → position: absolute dentro de #app  (NO fixed)
    • .rose-zone → position: absolute dentro de #app (NO fixed)
    • #letter-overlay → position: fixed fuera de #app (único fixed permitido)
    • SIN overflow:hidden en html/body (causa pantalla en blanco en Android)
    • SIN "inset" shorthand (no soportado en Android < 87)
    • Canvas escalado con devicePixelRatio para pantallas Retina nítidas
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet" />

  <style>
    /* ══════════════════════════════════════════
       RESET MÍNIMO
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose-deep:  #d63e6a;
      --rose-dark:  #8b1a3c;
      --rose-mid:   #f8b4c0;
      --gold:       #c9a96e;
      --muted:      #a06070;
      --ease:       cubic-bezier(0.4, 0, 0.2, 1);
      --spring:     cubic-bezier(0.34, 1.25, 0.64, 1);
    }

    /* html/body: SIN overflow:hidden, SIN height:100%
       Eso causa pantalla en blanco en navegadores móviles */
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffe4e1;
      /* Evita el overscroll-bounce de iOS mostrando el color del fondo */
      overscroll-behavior: none;
    }

    /* ══════════════════════════════════════════
       #APP — Contenedor raíz
       Su altura se fija con JS a window.innerHeight
       para que funcione correctamente en iOS Safari
       (la barra de navegación no roba espacio)
    ══════════════════════════════════════════ */
    #app {
      position: relative;
      width: 100%;
      /* Fallback rápido hasta que JS calcule la altura */
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 55% at 15%  8%, #ffd6e0 0%, transparent 55%),
        radial-gradient(ellipse 65% 45% at 85% 92%, #fecdd3 0%, transparent 55%),
        #ffe4e1;
    }

    /* ── Canvas (detrás de todo, sin pointer-events) ── */
    #cvs {
      position: absolute;
      top: 0; left: 0;
      /* El tamaño real (px) se controla desde JS con devicePixelRatio.
         CSS sólo define que ocupe el 100% visual del contenedor. */
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* ══════════════════════════════════════════
       CONTENIDO — Columna centrada arriba
    ══════════════════════════════════════════ */
    #content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;           /* toma la altura del #app */
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Padding top: deja espacio para el notch y empieza el texto */
      padding: clamp(1.4rem, 8vh, 3.5rem) 1.25rem 0;
      /* pointer-events: none para que los clicks pasen al canvas y zonas de toque */
      pointer-events: none;
    }

    /* ── Cabecera decorativa ── */
    #hdr {
      text-align: center;
      margin-bottom: 0.6rem;
      transition: opacity 0.55s var(--ease), transform 0.55s var(--ease);
    }

    .subtitle {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 4.2vw, 1.15rem);
      color: var(--rose-deep);
      letter-spacing: 0.06em;
      opacity: 0;
      animation: fadeIn 0.85s 0.35s ease forwards;
    }

    .divider {
      width: 46px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose-mid), transparent);
      margin: 0.4rem auto 0;
      opacity: 0;
      animation: fadeIn 0.85s 0.55s ease forwards;
    }

    /* ── Texto guía ── */
    #guide {
      font-weight: 300;
      font-size: clamp(0.82rem, 4vw, 1rem);
      color: var(--muted);
      text-align: center;
      max-width: 280px;
      line-height: 1.65;
      margin-top: 0.55rem;
      opacity: 0;
      animation: fadeIn 0.85s 0.75s ease forwards;
      /* La transición JS de fade-out/in usa esta propiedad */
      transition: opacity 0.48s var(--ease);
    }

    /* ══════════════════════════════════════════
       ZONAS DE TOQUE — ROSAS
       position: absolute dentro de #app
       El JS las posiciona igual que el canvas
    ══════════════════════════════════════════ */
    .rz {
      position: absolute;   /* NO fixed — relativo a #app */
      width: 88px;
      height: 88px;
      border-radius: 50%;
      z-index: 3;
      transform: translate(-50%, -50%);
      cursor: pointer;
      /* Elimina el flash azul en Android */
      -webkit-tap-highlight-color: transparent;
    }

    /* Anillo pulsante: hint de que es interactivo */
    .rz::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      animation: ring 2.5s ease-in-out infinite;
    }

    @keyframes ring {
      0%   { transform: scale(0.82); border-color: rgba(214,62,106,0);   }
      50%  { transform: scale(1.22); border-color: rgba(214,62,106,0.42); }
      100% { transform: scale(0.82); border-color: rgba(214,62,106,0);   }
    }

    /* ══════════════════════════════════════════
       FASE 2 — SOBRE
    ══════════════════════════════════════════ */
    #env-wrap {
      display: none;           /* visible desde JS */
      margin-top: 1.5rem;
      opacity: 0;
      transform: scale(0.82) translateY(14px);
      transition: opacity 0.85s var(--ease), transform 0.85s var(--ease);
      pointer-events: none;
    }
    #env-wrap.show {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    .env-scene {
      perspective: 900px;
      width: min(250px, 78vw);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .env-body {
      position: relative;
      width: 100%;
      padding-top: 63%;        /* ratio del sobre */
      background: #fff3ee;
      border-radius: 4px 4px 12px 12px;
      box-shadow:
        0 14px 46px rgba(180,60,80,0.18),
        0 3px 10px  rgba(180,60,80,0.10),
        inset 0 -4px 0 #e8c4b8;
    }

    /* Líneas diagonales internas */
    .env-body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 4px 4px 12px 12px;
      background:
        linear-gradient(135deg, transparent 49%, #e8c4b8 49%, #e8c4b8 51%, transparent 51%),
        linear-gradient(225deg, transparent 49%, #e8c4b8 49%, #e8c4b8 51%, transparent 51%);
      opacity: 0.3;
    }

    .env-icon {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.5rem, 6vw, 2rem);
      color: var(--rose-mid);
      padding-top: 14%;
      pointer-events: none;
    }

    /* ── Solapa triangular ── */
    .env-flap {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 57%;
      background: linear-gradient(162deg, #ffd6e0 0%, #f8b4c0 100%);
      clip-path: polygon(0% 0%, 100% 0%, 50% 90%);
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 0.9s var(--ease);
      z-index: 10;
      border-radius: 4px 4px 0 0;
    }
    .env-flap::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      clip-path: polygon(0% 0%, 100% 0%, 50% 90%);
      background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, transparent 52%);
    }
    .env-flap.open { transform: rotateX(188deg); }

    /* ══════════════════════════════════════════
       FASE 3 — CARTA (Bottom Sheet, position:fixed)
       Único elemento en position:fixed.
       Está FUERA de #app para no ser cortado.
    ══════════════════════════════════════════ */
    #letter {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      background: rgba(90,20,40,0);
      transition: opacity 0.65s var(--ease), background 0.65s var(--ease);
    }
    #letter.show {
      opacity: 1;
      pointer-events: auto;
      background: rgba(90,20,40,0.28);
    }

    .letter-card {
      width: min(430px, 97vw);
      /* Carta toma hasta 80% de la altura real de la ventana */
      max-height: 80vh;
      background: #fffaf8;
      border-radius: 22px 22px 0 0;
      /* padding-bottom extra para el safe-area de iPhone (notch inferior) */
      padding: 1.6rem 1.6rem calc(1.8rem + env(safe-area-inset-bottom, 0px));
      transform: translateY(100%);
      transition: transform 1s var(--spring);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent, transparent 27px,
        rgba(201,169,110,0.07) 27px, rgba(201,169,110,0.07) 28px
      );
      box-shadow: 0 -10px 50px rgba(180,60,80,0.22);
    }
    #letter.show .letter-card { transform: translateY(0); }

    .l-handle {
      width: 36px; height: 4px;
      background: var(--rose-mid);
      border-radius: 2px;
      margin: 0 auto 1.5rem;
      opacity: 0.4;
    }

    .l-body { text-align: center; }

    .l-emoji {
      display: block;
      font-size: clamp(1.8rem, 7vw, 2.4rem);
      margin-bottom: 0.8rem;
      animation: bounceIn 0.7s 1s ease both;
    }

    .l-body h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.2rem, 6.5vw, 1.65rem);
      font-weight: 600;
      color: var(--rose-dark);
      line-height: 1.3;
      margin-bottom: 1rem;
    }

    .l-body p {
      font-weight: 300;
      font-size: clamp(0.88rem, 4vw, 1rem);
      color: var(--muted);
      line-height: 1.85;
      margin-bottom: 1.2rem;
    }

    .l-sign {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: clamp(0.82rem, 3.6vw, 0.95rem);
      color: var(--gold);
    }

    .heartbeat {
      display: inline-block;
      font-size: clamp(1.7rem, 7vw, 2.2rem);
      margin: 0.4rem 0 0.7rem;
      animation: hb 1.1s ease-in-out infinite;
    }

    /* ══════════════════════════════════════════
       FRASE FLOTANTE
    ══════════════════════════════════════════ */
    .phrase {
      position: fixed;        /* fixed para que se vea sobre todo */
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: clamp(0.9rem, 4.6vw, 1.1rem);
      color: var(--rose-dark);
      text-shadow: 0 1px 10px rgba(255,255,255,0.95);
      pointer-events: none;
      white-space: nowrap;
      z-index: 25;
      transform: translateX(-50%);
      animation: floatUp 2.6s ease-out forwards;
    }

    /* ══════════════════════════════════════════
       CONFETI
    ══════════════════════════════════════════ */
    .confetti {
      position: fixed;
      top: -16px;
      pointer-events: none;
      z-index: 60;
      animation: fall linear forwards;
    }

    /* ══════════════════════════════════════════
       KEYFRAMES
    ══════════════════════════════════════════ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    @keyframes floatUp {
      0%   { opacity: 0;    transform: translateX(-50%) translateY(0)      scale(.78); }
      16%  { opacity: 1;    transform: translateX(-50%) translateY(-18px)   scale(1.06); }
      80%  { opacity: 0.75; transform: translateX(-50%) translateY(-100px)  scale(1);   }
      100% { opacity: 0;    transform: translateX(-50%) translateY(-130px)  scale(.9);  }
    }
    @keyframes hb {
      0%  { transform: scale(1);    }
      14% { transform: scale(1.28); }
      28% { transform: scale(1);    }
      42% { transform: scale(1.16); }
      70% { transform: scale(1);    }
    }
    @keyframes bounceIn {
      from { opacity: 0; transform: scale(.4); }
      60%  { transform: scale(1.15); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes fall {
      0%   { transform: translateY(0)      rotate(0deg)   scaleX(1);  opacity: 1;   }
      80%  { opacity: 0.8; }
      100% { transform: translateY(105vh)  rotate(720deg) scaleX(.3); opacity: 0;   }
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════
       CONTENEDOR PRINCIPAL
       Su alto se fija en JS con window.innerHeight
       para sortear el bug de iOS con 100vh
  ════════════════════════════════ -->
  <div id="app">

    <!-- Canvas de partículas (z=1, pointer-events:none) -->
    <canvas id="cvs"></canvas>

    <!-- Columna de contenido (z=2) -->
    <div id="content">

      <!-- Cabecera decorativa -->
      <div id="hdr">
        <p class="subtitle">para Xiomy ✦</p>
        <div class="divider"></div>
      </div>

      <!-- Texto guía -->
      <p id="guide" role="status" aria-live="polite">
        🌹 Xiomy, limpia el camino para descubrir tu sorpresa...
      </p>

      <!-- Sobre (Fase 2) -->
      <div id="env-wrap">
        <div class="env-scene" id="env-scene"
             role="button" tabindex="0"
             aria-label="Sobre cerrado — tócalo para abrir">
          <div class="env-body">
            <div class="env-flap" id="env-flap"></div>
            <div class="env-icon">✉</div>
          </div>
        </div>
      </div>

    </div><!-- /content -->

    <!-- Zonas de toque de rosas (z=3, absolute dentro de #app) -->
    <div id="rz0" class="rz" role="button" tabindex="0" aria-label="Rosa 1 — tócala"></div>
    <div id="rz1" class="rz" role="button" tabindex="0" aria-label="Rosa 2 — tócala"></div>
    <div id="rz2" class="rz" role="button" tabindex="0" aria-label="Rosa 3 — tócala"></div>

  </div><!-- /app -->

  <!-- ════════════════════════════════
       CARTA — position:fixed, fuera de #app
       para que nunca sea cortada por overflow
  ════════════════════════════════ -->
  <div id="letter" aria-hidden="true" role="dialog" aria-label="Carta de cumpleaños">
    <div class="letter-card">
      <div class="l-handle"></div>
      <div class="l-body">
        <span class="l-emoji">🎂🌹🎉</span>
        <h1>¡¡Feliz Cumpleaños<br>Xiomy!!</h1>
        <p>Te deseo un día increíble, lleno de risas, amor y momentos hermosos. ¡Te mereces lo mejor hoy y siempre!</p>
        <div class="heartbeat" role="img" aria-label="Corazón palpitante">❤️</div>
        <p class="l-sign">Con todo el cariño del mundo 🌹</p>
      </div>
    </div>
  </div>

  <script>
  /* ════════════════════════════════════════════════════
     CONFIGURACIÓN Y ESTADO
  ════════════════════════════════════════════════════ */
  const app     = document.getElementById('app');
  const cvs     = document.getElementById('cvs');
  const ctx     = cvs.getContext('2d');
  const guide   = document.getElementById('guide');
  const hdr     = document.getElementById('hdr');
  const envWrap = document.getElementById('env-wrap');
  const envFlap = document.getElementById('env-flap');
  const envScene= document.getElementById('env-scene');
  const letter  = document.getElementById('letter');

  const PHRASES = [
    '¡Eres súper fuerte! 💪',
    '¡Eres inteligentísima! 🧠✨',
    '¡Eres increíblemente única! ❤️'
  ];
  const CONF_COLORS = ['#f8b4c0','#d63e6a','#c9a96e','#f9d5e5',
                       '#ffcba4','#a8d8ea','#b5e7a0','#fce38a','#ff6b9d'];
  const P_COLORS    = ['#d63e6a','#e91e63','#f06292','#f8bbd0',
                       '#fce4ec','#c9a96e','#ff6b9d','#f48fb1','#ff80ab'];

  let AW = 0, AH = 0, DPR = 1;   // dimensiones del canvas lógicas
  let phase    = 1;
  let killed   = 0;
  let envOpen  = false;
  let looping  = true;
  let roses    = [];

  /* ════════════════════════════════════════════════════
     DIMENSIONADO RESPONSIVE
     Se llama al inicio y en cada resize.
     Usa window.innerHeight (NO 100vh) para evitar
     el bug de iOS Safari con la barra de navegación.
  ════════════════════════════════════════════════════ */
  function setDimensions() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    DPR     = window.devicePixelRatio || 1;

    /* Fija el alto de #app a la altura real visible */
    app.style.height = H + 'px';

    /* Dimensiones lógicas del canvas (para dibujar) */
    AW = W;
    AH = H;

    /* Dimensiones físicas del canvas (píxeles reales) */
    cvs.width  = W * DPR;
    cvs.height = H * DPR;

    /* Escala el contexto para que las coordenadas
       lógicas coincidan con los px CSS y con las
       posiciones CSS de las zonas de toque */
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  /* ════════════════════════════════════════════════════
     POSICIONES DE LAS ROSAS
     Retorna coordenadas lógicas (px CSS) relativas
     al origen de #app (top-left).
  ════════════════════════════════════════════════════ */
  function rosePos(idx) {
    return [
      { x: AW * 0.20, y: AH * 0.66 },
      { x: AW * 0.50, y: AH * 0.57 },
      { x: AW * 0.80, y: AH * 0.66 }
    ][idx];
  }

  /* Mueve las zonas de toque CSS a la posición de cada rosa */
  function placeZone(idx, x, y) {
    const z = document.getElementById('rz' + idx);
    if (z) { z.style.left = x + 'px'; z.style.top = y + 'px'; }
  }

  /* ════════════════════════════════════════════════════
     CURVA ROSA — FORMA DE LAS PARTÍCULAS
     r = R · |cos(2θ)|  →  4 pétalos simétricos
  ════════════════════════════════════════════════════ */
  function roseShape(cx, cy) {
    const pts = [];
    const N   = 68;

    /* Pétalos */
    const np = Math.floor(N * 0.54);
    for (let i = 0; i < np; i++) {
      const t = (i / np) * Math.PI * 2;
      const r = 30 * Math.abs(Math.cos(2 * t));
      pts.push({ x: cx + r * Math.cos(t), y: cy + r * Math.sin(t) * 0.78 });
    }
    /* Relleno interior */
    const nf = Math.floor(N * 0.30);
    for (let i = 0; i < nf; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.sqrt(Math.random()) * 14;
      pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
    }
    /* Núcleo central */
    for (let i = 0, nc = N - np - nf; i < nc; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.random() * 5;
      pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
    }
    return pts;
  }

  /* Color por distancia al centro: dorado → rosa claro → rosa intenso */
  function ptColor(ox, oy) {
    const d = Math.hypot(ox, oy);
    if (d < 6)  return '#c9a96e';
    if (d < 15) return ['#f8bbd0','#fce4ec','#f48fb1'][Math.random()*3|0];
    return P_COLORS[Math.random() * P_COLORS.length | 0];
  }

  /* ════════════════════════════════════════════════════
     CREAR UNA ROSA
  ════════════════════════════════════════════════════ */
  function makeRose(idx, cx, cy, delay) {
    const targets = roseShape(cx, cy);
    const now     = performance.now();
    const parts   = targets.map((t, i) => {
      const ox = t.x - cx;
      const oy = t.y - cy;
      const ia = Math.random() * Math.PI * 2;
      const id = 160 + Math.random() * 220;
      return {
        x: cx + Math.cos(ia) * id,   /* posición inicial dispersa */
        y: cy + Math.sin(ia) * id,
        ox, oy,                       /* offset desde centro */
        sz:    2.4 + Math.random() * 3.6,
        col:   ptColor(ox, oy),
        op:    0,
        spd:   0.052 + Math.random() * 0.04,
        st:    'wait',                /* wait→asm→float→boom */
        at:    now + delay + i * 14, /* momento de arrancar */
        fa:    Math.random() * Math.PI * 2,
        fs:    0.007 + Math.random() * 0.012,
        fr:    0.8 + Math.random() * 2.2,
        vx: 0, vy: 0
      };
    });
    return { idx, cx, cy, parts, lt: Math.random()*Math.PI*2, ly:0, alive:true, built:false };
  }

  /* ════════════════════════════════════════════════════
     INIT ROSAS
  ════════════════════════════════════════════════════ */
  function initRoses() {
    roses = [0,1,2].map(i => {
      const p = rosePos(i);
      placeZone(i, p.x, p.y);
      return makeRose(i, p.x, p.y, i * 370);
    });
  }

  /* ════════════════════════════════════════════════════
     UPDATE — física por frame
  ════════════════════════════════════════════════════ */
  function update(now) {
    roses.forEach(rose => {
      if (rose.alive) {
        rose.lt += 0.016;
        rose.ly  = Math.sin(rose.lt) * 10;
      }
      let allDone = true;

      rose.parts.forEach(p => {
        if (p.st === 'wait') {
          if (now >= p.at) p.st = 'asm'; else allDone = false; return;
        }
        if (p.st === 'asm') {
          allDone = false;
          p.op = Math.min(1, p.op + 0.055);
          const tx = rose.cx + p.ox;
          const ty = rose.cy + p.oy;
          p.x += (tx - p.x) * p.spd;
          p.y += (ty - p.y) * p.spd;
          if ((tx-p.x)**2 + (ty-p.y)**2 < 0.9 && p.op >= 0.97) {
            p.x = tx; p.y = ty; p.st = 'float';
          }
          return;
        }
        if (p.st === 'float') {
          p.fa += p.fs;
          /* posición = centro + offset + micro-orbital + levitación global */
          p.x = rose.cx + p.ox + Math.cos(p.fa) * p.fr;
          p.y = rose.cy + p.oy + Math.sin(p.fa) * p.fr + rose.ly;
          return;
        }
        if (p.st === 'boom') {
          p.x  += p.vx;
          p.y  += p.vy;
          p.vy += 0.22;         /* gravedad */
          p.vx *= 0.97;         /* fricción */
          p.op  = Math.max(0, p.op - 0.026);
          p.sz  = Math.max(0,  p.sz  * 0.975);
        }
      });

      if (allDone && !rose.built) rose.built = true;
    });
  }

  /* ════════════════════════════════════════════════════
     DRAW — renderizado en canvas
  ════════════════════════════════════════════════════ */
  function draw() {
    ctx.clearRect(0, 0, AW, AH);

    roses.forEach(rose => {
      /* Glow suave cuando la rosa está ensamblada */
      if (rose.built && rose.alive) {
        const gx = rose.cx, gy = rose.cy + rose.ly;
        const g  = ctx.createRadialGradient(gx, gy, 2, gx, gy, 50);
        g.addColorStop(0, 'rgba(255,120,160,0.18)');
        g.addColorStop(1, 'rgba(255,120,160,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(gx, gy, 50, 0, Math.PI*2);
        ctx.fill();
      }
      /* Partículas */
      rose.parts.forEach(p => {
        if (p.op < 0.01) return;
        ctx.globalAlpha = p.op;
        ctx.fillStyle   = p.col;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.1, p.sz), 0, Math.PI*2);
        ctx.fill();
      });
    });

    ctx.globalAlpha = 1;
  }

  /* ════════════════════════════════════════════════════
     LOOP PRINCIPAL
  ════════════════════════════════════════════════════ */
  function loop(now) {
    if (!looping) return;
    update(now);
    draw();
    requestAnimationFrame(loop);
  }

  /* ════════════════════════════════════════════════════
     ACCIONES DE JUEGO
  ════════════════════════════════════════════════════ */

  /* Frase que asciende desde (x, y) */
  function spawnPhrase(x, y, txt) {
    const el = document.createElement('span');
    el.className   = 'phrase';
    el.textContent = txt;
    el.style.left  = x + 'px';
    el.style.top   = (y - 10) + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }

  /* Explota las partículas de una rosa */
  function boom(idx) {
    const rose = roses[idx];
    if (!rose || !rose.alive) return;
    rose.alive = false;
    rose.parts.forEach(p => {
      p.st = 'boom';
      const dx = p.x - rose.cx;
      const dy = p.y - rose.cy;
      const d  = Math.hypot(dx, dy) || 1;
      const s  = 3.5 + Math.random() * 8;
      p.vx = (dx/d)*s + (Math.random()-.5)*2.5;
      p.vy = (dy/d)*s - (1.5 + Math.random()*4.5);
    });
    const z = document.getElementById('rz'+idx);
    if (z) { z.style.pointerEvents='none'; z.style.animationName='none'; }
  }

  /* Toque sobre una rosa */
  function tapRose(idx) {
    if (!roses[idx] || !roses[idx].alive) return;
    const r = roses[idx];
    spawnPhrase(r.cx, r.cy, PHRASES[idx]);
    boom(idx);
    killed++;
    if (killed === 3) setTimeout(goPhase2, 820);
  }

  /* ── Fase 2: aparece el sobre ── */
  function goPhase2() {
    phase = 2;
    [0,1,2].forEach(i => {
      const z = document.getElementById('rz'+i);
      if (z) z.style.display = 'none';
    });
    /* Colapsa la cabecera para liberar espacio en el sobre */
    hdr.style.opacity   = '0';
    hdr.style.transform = 'translateY(-8px)';
    setTimeout(() => hdr.style.display = 'none', 580);

    fadeGuide('✉️ ¡Has encontrado una carta! Tócala para abrirla...');

    envWrap.style.display = 'block';
    void envWrap.offsetWidth;  /* fuerza reflow → activa la transición CSS */
    envWrap.classList.add('show');
    setTimeout(() => envScene.focus(), 900);
  }

  /* ── Fase 3: abre el sobre + muestra carta ── */
  function goPhase3() {
    if (envOpen || phase !== 2) return;
    envOpen = true;
    phase   = 3;

    envFlap.classList.add('open');
    fadeGuide('🎉 ¡Con todo el cariño del mundo!');

    setTimeout(() => {
      letter.classList.add('show');
      letter.setAttribute('aria-hidden', 'false');
    }, 780);

    setTimeout(confetti, 1150);
    setTimeout(() => { looping = false; ctx.clearRect(0,0,AW,AH); }, 3800);
    envScene.style.cursor = 'default';
  }

  /* Fade guía: opacidad 0 → cambia texto → opacidad 1 */
  function fadeGuide(txt) {
    guide.style.opacity = '0';
    setTimeout(() => { guide.textContent = txt; guide.style.opacity = '1'; }, 510);
  }

  /* ════════════════════════════════════════════════════
     CONFETI
  ════════════════════════════════════════════════════ */
  function confetti() {
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const el  = document.createElement('div');
        const sz  = 6 + Math.random() * 9;
        el.className = 'confetti';
        el.style.cssText = [
          'left:'              + (Math.random()*100) + 'vw',
          'width:'             + sz + 'px',
          'height:'            + sz*(Math.random()>.5?1:1.8) + 'px',
          'background:'        + CONF_COLORS[Math.random()*CONF_COLORS.length|0],
          'border-radius:'     + (Math.random()>.5?'50%':'2px'),
          'animation-duration:'+ (2+Math.random()*2.6) + 's',
          'animation-delay:'   + (Math.random()*.5) + 's'
        ].join(';');
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove(), { once: true });
      }, i * 38);
    }
  }

  /* ════════════════════════════════════════════════════
     EVENTOS DE USUARIO
  ════════════════════════════════════════════════════ */
  [0,1,2].forEach(i => {
    const z = document.getElementById('rz'+i);
    z.addEventListener('click',      ()  => tapRose(i));
    z.addEventListener('touchstart', e   => { e.preventDefault(); tapRose(i); }, { passive: false });
    z.addEventListener('keydown',    e   => {
      if (e.key==='Enter'||e.key===' ') { e.preventDefault(); tapRose(i); }
    });
  });

  envScene.addEventListener('click',      goPhase3);
  envScene.addEventListener('touchstart', e => { e.preventDefault(); goPhase3(); }, { passive: false });
  envScene.addEventListener('keydown',    e => {
    if (e.key==='Enter'||e.key===' ') { e.preventDefault(); goPhase3(); }
  });

  /* ════════════════════════════════════════════════════
     RESIZE — reposiciona todo al girar la pantalla
  ════════════════════════════════════════════════════ */
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      setDimensions();
      if (phase === 1) {
        roses.forEach((r, i) => {
          const p = rosePos(i);
          r.cx = p.x; r.cy = p.y;
          placeZone(i, p.x, p.y);
          /* reposiciona partículas en estado float */
          r.parts.forEach(p2 => {
            if (p2.st === 'float') {
              p2.x = r.cx + p2.ox;
              p2.y = r.cy + p2.oy;
            }
          });
        });
      }
    }, 120);
  });

  /* ════════════════════════════════════════════════════
     ARRANQUE
  ════════════════════════════════════════════════════ */
  setDimensions();
  initRoses();
  requestAnimationFrame(loop);
  </script>
</body>
</html>
