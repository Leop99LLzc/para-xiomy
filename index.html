<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌹 Feliz Cumpleaños Xiomy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    /* ══════════════════════════════════
       RESET Y VARIABLES
    ══════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose-deep:  #d63e6a;
      --rose-dark:  #8b1a3c;
      --rose-mid:   #f8b4c0;
      --gold:       #c9a96e;
      --text-muted: #a06070;
      --text-main:  #5a1a30;
      --ease:       cubic-bezier(0.4, 0, 0.2, 1);
      --spring:     cubic-bezier(0.34, 1.25, 0.64, 1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Lato', sans-serif;
      /* Fondo en gradiente radial suave */
      background:
        radial-gradient(ellipse 80% 55% at 15% 8%,  #ffd6e0 0%, transparent 55%),
        radial-gradient(ellipse 65% 45% at 85% 92%, #fecdd3 0%, transparent 55%),
        #ffe4e1;
      color: var(--text-main);
    }

    /* ══════════════════════════════════
       CAPAS DE Z-INDEX
       1  → canvas (partículas, detrás de todo)
       2  → escena principal (texto, sobre)
       3  → zonas de toque de rosas
       20 → frases flotantes
       50 → overlay de la carta
       60 → confeti
    ══════════════════════════════════ */

    /* ── Canvas de partículas ── */
    #main-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none; /* nunca intercepta toques */
    }

    /* ── Escena principal ── */
    .scene {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; /* arriba para dejar rosas abajo */
      padding: clamp(1.2rem, 7vh, 3rem) 1.5rem 0;
      z-index: 2;
      pointer-events: none; /* hijos activan pointer-events cuando necesitan */
    }

    /* ── Cabecera decorativa ── */
    #header-dec {
      text-align: center;
      margin-bottom: 0.6rem;
      transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
    }

    .page-subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 4vw, 1.1rem);
      color: var(--rose-deep);
      letter-spacing: 0.06em;
      margin-bottom: 0.45rem;
      opacity: 0;
      animation: fadeSlideIn 0.9s 0.3s ease forwards;
    }

    .page-divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose-mid), transparent);
      margin: 0 auto;
      opacity: 0;
      animation: fadeSlideIn 0.9s 0.5s ease forwards;
    }

    /* ── Texto guía ── */
    #guide-text {
      font-weight: 300;
      font-size: clamp(0.8rem, 3.8vw, 1rem);
      color: var(--text-muted);
      text-align: center;
      max-width: 290px;
      line-height: 1.65;
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeSlideIn 0.9s 0.7s ease forwards;
      transition: opacity 0.5s var(--ease);
      pointer-events: none;
    }

    /* ══════════════════════════════════
       ZONAS DE TOQUE — ROSAS
    ══════════════════════════════════ */
    .rose-zone {
      position: fixed;
      width: 90px; height: 90px;
      border-radius: 50%;
      z-index: 3;
      transform: translate(-50%, -50%);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: transparent;
    }

    /* Anillo pulsante: hint de interactividad */
    .rose-zone::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(214, 62, 106, 0);
      animation: ringPulse 2.4s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%   { transform: scale(0.85); border-color: rgba(214,62,106,0);    }
      50%  { transform: scale(1.2);  border-color: rgba(214,62,106,0.40); }
      100% { transform: scale(0.85); border-color: rgba(214,62,106,0);    }
    }

    /* ══════════════════════════════════
       FASE 2 — SOBRE
    ══════════════════════════════════ */
    #envelope-wrap {
      display: none;
      margin-top: 1.4rem;
      opacity: 0;
      transform: scale(0.82) translateY(18px);
      transition: opacity 0.85s var(--ease), transform 0.85s var(--ease);
      pointer-events: none;
    }

    #envelope-wrap.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    .envelope-scene {
      perspective: 900px;
      width: min(250px, 78vw);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .envelope-body {
      position: relative;
      width: 100%;
      padding-top: 63%;
      background: #fff3ee;
      border-radius: 4px 4px 12px 12px;
      box-shadow:
        0 14px 48px rgba(180,60,80,0.20),
        0 3px 12px rgba(180,60,80,0.10),
        inset 0 -4px 0 #e8c4b8;
    }

    /* Líneas diagonales internas */
    .envelope-body::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 4px 4px 12px 12px;
      background:
        linear-gradient(135deg, transparent 49%, #e8c4b8 49%, #e8c4b8 51%, transparent 51%),
        linear-gradient(225deg, transparent 49%, #e8c4b8 49%, #e8c4b8 51%, transparent 51%);
      opacity: 0.32;
    }

    /* Ícono central */
    .envelope-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 6vw, 2.1rem);
      color: var(--rose-mid);
      padding-top: 14%;
      pointer-events: none;
    }

    /* ── Solapa triangular ── */
    .envelope-flap {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 56%;
      background: linear-gradient(162deg, #ffd6e0 0%, #f8b4c0 100%);
      clip-path: polygon(0% 0%, 100% 0%, 50% 90%);
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 0.88s var(--ease);
      z-index: 10;
      border-radius: 4px 4px 0 0;
    }

    /* Brillo en solapa */
    .envelope-flap::after {
      content: '';
      position: absolute; inset: 0;
      clip-path: polygon(0% 0%, 100% 0%, 50% 90%);
      background: linear-gradient(180deg, rgba(255,255,255,0.24) 0%, transparent 52%);
    }

    .envelope-flap.open { transform: rotateX(188deg); }

    /* ══════════════════════════════════
       FASE 3 — CARTA (Bottom Sheet)
       Solución definitiva: overlay fijo
       encima de todo, sin depender del
       tamaño del sobre.
    ══════════════════════════════════ */
    #letter-overlay {
      position: fixed; inset: 0;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      background: rgba(90, 20, 40, 0);
      transition:
        opacity 0.7s var(--ease),
        background 0.7s var(--ease);
    }

    #letter-overlay.visible {
      opacity: 1;
      pointer-events: auto;
      background: rgba(90, 20, 40, 0.30);
    }

    /* Tarjeta de la carta: bottom sheet */
    .letter-card {
      width: min(430px, 97vw);
      max-height: 80vh;
      background: #fffaf8;
      border-radius: 22px 22px 0 0;
      padding: 1.6rem 1.6rem clamp(2rem, 6vh, 3.5rem);
      transform: translateY(100%);
      transition: transform 1s var(--spring);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      /* Líneas sutiles de papel */
      background-image: repeating-linear-gradient(
        to bottom,
        transparent, transparent 27px,
        rgba(201,169,110,0.07) 27px, rgba(201,169,110,0.07) 28px
      );
      box-shadow:
        0 -12px 55px rgba(180,60,80,0.22),
        inset 0 0 0 1.5px rgba(201,169,110,0.22);
    }

    #letter-overlay.visible .letter-card { transform: translateY(0); }

    /* Handle (barra gris tipo bottom sheet) */
    .letter-handle {
      width: 36px; height: 4px;
      background: var(--rose-mid);
      border-radius: 2px;
      margin: 0 auto 1.5rem;
      opacity: 0.45;
    }

    /* Contenido */
    .letter-content { text-align: center; }

    .letter-emoji {
      font-size: clamp(1.8rem, 7vw, 2.4rem);
      display: block;
      margin-bottom: 0.8rem;
      animation: bounceIn 0.7s 1s ease both;
    }

    .letter-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 6.5vw, 1.65rem);
      font-weight: 600;
      color: var(--rose-dark);
      line-height: 1.3;
      margin-bottom: 1rem;
    }

    .letter-content p {
      font-weight: 300;
      font-size: clamp(0.86rem, 3.9vw, 1rem);
      color: var(--text-muted);
      line-height: 1.85;
      margin-bottom: 1.3rem;
    }

    .letter-signature {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.82rem, 3.5vw, 0.95rem);
      color: var(--gold);
      margin-top: 0.2rem;
    }

    .heart-beat {
      display: inline-block;
      font-size: clamp(1.6rem, 7vw, 2.2rem);
      margin: 0.4rem 0 0.6rem;
      animation: heartbeat 1.1s ease-in-out infinite;
    }

    /* ══════════════════════════════════
       FRASES FLOTANTES
    ══════════════════════════════════ */
    .float-phrase {
      position: fixed;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.88rem, 4.5vw, 1.1rem);
      color: var(--rose-dark);
      text-shadow: 0 1px 10px rgba(255,255,255,0.95);
      pointer-events: none;
      white-space: nowrap;
      z-index: 20;
      transform: translateX(-50%);
      animation: floatUp 2.6s ease-out forwards;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateX(-50%) translateY(0)     scale(0.75); }
      18%  { opacity: 1; transform: translateX(-50%) translateY(-20px)  scale(1.06); }
      82%  { opacity: 0.75; transform: translateX(-50%) translateY(-100px) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-130px) scale(0.9); }
    }

    /* ══════════════════════════════════
       CONFETI
    ══════════════════════════════════ */
    .confetti-piece {
      position: fixed;
      top: -18px;
      pointer-events: none;
      z-index: 60;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg) scaleX(1); opacity: 1; }
      80%  { opacity: 0.85; }
      100% { transform: translateY(105vh) rotate(720deg) scaleX(0.3); opacity: 0; }
    }

    /* ══════════════════════════════════
       ANIMACIONES GLOBALES
    ══════════════════════════════════ */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes heartbeat {
      0%  { transform: scale(1);    }
      14% { transform: scale(1.28); }
      28% { transform: scale(1);    }
      42% { transform: scale(1.16); }
      70% { transform: scale(1);    }
    }

    @keyframes bounceIn {
      from { opacity: 0; transform: scale(0.4); }
      60%  { transform: scale(1.15); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Accesibilidad */
    .visually-hidden {
      position: absolute; width: 1px; height: 1px;
      overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1 class="visually-hidden">Tarjeta de cumpleaños interactiva para Xiomy</h1>

  <!-- ── Canvas (rosas de partículas, z=1) ── -->
  <canvas id="main-canvas"></canvas>

  <!-- ── Escena principal (z=2) ── -->
  <main class="scene">

    <div id="header-dec">
      <p class="page-subtitle" aria-hidden="true">para Xiomy ✦</p>
      <div class="page-divider" aria-hidden="true"></div>
    </div>

    <p id="guide-text" role="status" aria-live="polite">
      🌹 Xiomy, limpia el camino para descubrir tu sorpresa...
    </p>

    <!-- Sobre (Fase 2, oculto al inicio) -->
    <div id="envelope-wrap" aria-label="Sobre con carta">
      <div class="envelope-scene" id="envelope-scene"
           role="button" tabindex="0"
           aria-label="Sobre cerrado — tócalo para abrir">
        <div class="envelope-body">
          <div class="envelope-flap" id="envelope-flap" aria-hidden="true"></div>
          <div class="envelope-icon" aria-hidden="true">✉</div>
        </div>
      </div>
    </div>

  </main>

  <!-- ── Carta (z=50, bottom sheet fijo) ── -->
  <div id="letter-overlay" aria-hidden="true" role="dialog" aria-label="Carta de cumpleaños para Xiomy">
    <div class="letter-card">
      <div class="letter-handle" aria-hidden="true"></div>
      <div class="letter-content">
        <span class="letter-emoji" aria-hidden="true">🎂🌹🎉</span>
        <h1>¡¡Feliz Cumpleaños<br>Xiomy!!</h1>
        <p>
          Te deseo un día increíble, lleno de risas,
          amor y momentos hermosos.
          ¡Te mereces lo mejor hoy y siempre!
        </p>
        <div class="heart-beat" role="img" aria-label="Corazón palpitante">❤️</div>
        <p class="letter-signature">Con todo el cariño del mundo 🌹</p>
      </div>
    </div>
  </div>

  <!-- ── Zonas de toque para rosas (z=3, posicionadas por JS) ── -->
  <div id="rose-zone-0" class="rose-zone" role="button" tabindex="0" aria-label="Rosa 1 — tócala"></div>
  <div id="rose-zone-1" class="rose-zone" role="button" tabindex="0" aria-label="Rosa 2 — tócala"></div>
  <div id="rose-zone-2" class="rose-zone" role="button" tabindex="0" aria-label="Rosa 3 — tócala"></div>

  <script>
    'use strict';

    /* ═══════════════════════════════════════════════════
       CANVAS
    ═══════════════════════════════════════════════════ */
    const canvas = document.getElementById('main-canvas');
    const ctx    = canvas.getContext('2d');
    let W = 0, H = 0;

    function resizeCanvas() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', () => {
      resizeCanvas();
      if (currentPhase === 1) roses.forEach((r, i) => {
        const p = getRosePos(i);
        r.cx = p.x; r.cy = p.y;
        setZonePos(i, p.x, p.y);
      });
    });

    /* ═══════════════════════════════════════════════════
       ESTADO GLOBAL
    ═══════════════════════════════════════════════════ */
    let currentPhase    = 1;
    let eliminated      = 0;
    let envelopeOpen    = false;
    let animRunning     = true;
    let roses           = [];

    /* ═══════════════════════════════════════════════════
       COLORES DE PARTÍCULAS
       Distribuidos por distancia al centro de la rosa:
       centro=dorado → medio=rosa claro → pétalos=rosa intenso
    ═══════════════════════════════════════════════════ */
    function roseParticleColor(ox, oy) {
      const d = Math.sqrt(ox * ox + oy * oy);
      if (d < 6)  return '#c9a96e';                                          // centro dorado
      if (d < 14) return ['#f8bbd0','#fce4ec','#f48fb1'][Math.random()*3|0]; // anillo interior rosa claro
      return ['#d63e6a','#e91e63','#f06292','#ff6b9d'][Math.random()*4|0];   // pétalos rosas intensos
    }

    /* ═══════════════════════════════════════════════════
       POSICIONES DE LAS 3 ROSAS
       (parte inferior del viewport, bien separadas)
    ═══════════════════════════════════════════════════ */
    function getRosePos(idx) {
      // Las rosas ocupan la mitad inferior para no tapar el texto
      const positions = [
        { x: W * 0.20, y: H * 0.66 },
        { x: W * 0.50, y: H * 0.58 },
        { x: W * 0.80, y: H * 0.66 }
      ];
      return positions[idx];
    }

    /* ═══════════════════════════════════════════════════
       FORMA DE LA ROSA — CURVA POLAR
       r = R * |cos(2θ)|  →  4 pétalos
    ═══════════════════════════════════════════════════ */
    function generateRoseTargets(cx, cy) {
      const targets = [];
      const N = 68;

      // ── Pétalos (curva rosa) ──
      const nPetal = Math.floor(N * 0.55);
      for (let i = 0; i < nPetal; i++) {
        const t = (i / nPetal) * Math.PI * 2;
        const r = 30 * Math.abs(Math.cos(2 * t));
        targets.push({
          x: cx + r * Math.cos(t),
          y: cy + r * Math.sin(t) * 0.78 // achatado → roseta
        });
      }

      // ── Relleno interior ──
      const nFill = Math.floor(N * 0.30);
      for (let i = 0; i < nFill; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * 14;
        targets.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
      }

      // ── Núcleo central ──
      const nCore = N - nPetal - nFill;
      for (let i = 0; i < nCore; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 5;
        targets.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
      }
      return targets;
    }

    /* ═══════════════════════════════════════════════════
       CREAR UNA ROSA
    ═══════════════════════════════════════════════════ */
    function createRose(idx, cx, cy, roseDelay) {
      const targets = generateRoseTargets(cx, cy);
      const now = performance.now();
      const particles = targets.map((t, i) => {
        const ox  = t.x - cx;
        const oy  = t.y - cy;
        // Posición inicial: dispersa alrededor del centro
        const ia  = Math.random() * Math.PI * 2;
        const id  = 170 + Math.random() * 220;
        return {
          x:          cx + Math.cos(ia) * id,  // posición actual X
          y:          cy + Math.sin(ia) * id,  // posición actual Y
          ox,                                   // offset X desde centro (para floating)
          oy,                                   // offset Y desde centro
          size:       2.4 + Math.random() * 3.6,
          color:      roseParticleColor(ox, oy),
          opacity:    0,
          speed:      0.050 + Math.random() * 0.042,
          state:      'waiting',                 // waiting→assembling→floating→exploding
          readyAt:    now + roseDelay + i * 15, // ensamblaje escalonado partícula a partícula
          floatAngle: Math.random() * Math.PI * 2,
          floatSpeed: 0.007 + Math.random() * 0.012,
          floatR:     0.8 + Math.random() * 2.2,
          vx: 0, vy: 0
        };
      });
      return { idx, cx, cy, particles, levTime: Math.random() * Math.PI * 2, levY: 0, active: true, assembled: false };
    }

    /* ── Inicializa las 3 rosas ── */
    function initRoses() {
      roses = [0, 1, 2].map(i => {
        const pos  = getRosePos(i);
        const rose = createRose(i, pos.x, pos.y, i * 380); // 380ms entre rosas
        setZonePos(i, pos.x, pos.y);
        return rose;
      });
    }

    /* ── Posiciona una zona de toque ── */
    function setZonePos(idx, x, y) {
      const z = document.getElementById(`rose-zone-${idx}`);
      if (z) { z.style.left = x + 'px'; z.style.top = y + 'px'; }
    }

    /* ═══════════════════════════════════════════════════
       UPDATE — física de partículas
    ═══════════════════════════════════════════════════ */
    function update(now) {
      roses.forEach(rose => {
        // Levitación sinusoidal suave del conjunto
        if (rose.active) {
          rose.levTime += 0.016;
          rose.levY     = Math.sin(rose.levTime) * 10;
        }

        let allReady = true;

        rose.particles.forEach(p => {

          if (p.state === 'waiting') {
            if (now >= p.readyAt) p.state = 'assembling';
            else allReady = false;
            return;
          }

          if (p.state === 'assembling') {
            allReady = false;
            p.opacity = Math.min(1,
